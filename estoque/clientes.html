<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Depósito de Bebidas JP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container active-view">
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-boxes-stacked brand-icon"></i>
                <div class="brand-text">
                    <h3>Depósito</h3>
                    <p>de Bebidas JP</p>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a class="menu-item" href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a class="menu-item active" href="clientes.html"><i class="fa-solid fa-users"></i> Clientes (Cadastro)</a>
                <a class="menu-item" href="estoque.html"><i class="fa-solid fa-box"></i> Estoque (Lista)</a>
                <a class="menu-item" href="categorias.html"><i class="fa-solid fa-tags"></i> Categorias</a>
                <a class="menu-item" href="relatorios.html"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
                <a class="menu-item logout" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <!-- CABEÇALHO DA PÁGINA COM CONTADORES -->
            <header class="main-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #fff; border-bottom: 1px solid #e2e8f0;">
                <h1 id="page-title" style="margin: 0;">Cadastro</h1>
                
                <div class="header-totals" style="display: flex; gap: 25px; align-items: center; margin-left: auto; margin-right: 30px;">
                    <div style="text-align: right;">
                        <span style="font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; display: block; letter-spacing: 0.5px;">Produtos</span>
                        <strong id="header-total-itens" style="color: #0f172a; font-size: 16px; font-weight: 700;">0</strong>
                    </div>
                    <div style="text-align: right; border-left: 1px solid #e2e8f0; padding-left: 25px;">
                        <span style="font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; display: block; letter-spacing: 0.5px;">Estoque un.</span>
                        <strong id="header-total-unidades" style="color: #2563eb; font-size: 16px; font-weight: 700;">0 un.</strong>
                    </div>
                    <div style="text-align: right; border-left: 1px solid #e2e8f0; padding-left: 25px;">
                        <span style="font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; display: block; letter-spacing: 0.5px;">Valor Total</span>
                        <strong id="header-total-financeiro" style="color: #16a34a; font-size: 16px; font-weight: 700;">R$ 0,00</strong>
                    </div>
                </div>

                <div class="user-dropdown" style="display: flex; align-items: center; gap: 10px;">
                    <i class="fa-solid fa-circle-user user-icon"></i>
                    <span>Administrador</span>
                </div>
            </header>

            <div id="view-cadastro" class="app-view active-view">
                <!-- NAVEGAÇÃO INTERNA ENTRE FORMULÁRIOS (ABAS) -->
                <div class="tab-navigation">
                    <button class="tab-btn active" id="tab-btn-cliente" onclick="switchFormTab('cliente')">
                        <i class="fa-solid fa-user-plus"></i> Cadastro de Cliente
                    </button>
                    <button class="tab-btn" id="tab-btn-estoque" onclick="switchFormTab('estoque')">
                        <i class="fa-solid fa-boxes-packing"></i> Cadastro de Estoque
                    </button>
                </div>

                <!-- SEÇÃO 1: CADASTRO E LISTAGEM DE CLIENTE -->
                <div class="form-section active" id="section-form-cliente">
                    <div class="forms-card">
                        <div class="section-header">
                            <h2><i class="fa-solid fa-id-card"></i> Dados do Cliente</h2>
                            <i class="fa-solid fa-users" style="color: #64748b; font-size: 20px;"></i>
                        </div>
                        <form onsubmit="handleFormAction(event, 'Cliente')">
                            <div class="form-grid">
                                <div class="input-box">
                                    <label>Nome</label>
                                    <input type="text" id="cliente-nome" placeholder="Digite o nome" required>
                                </div>
                                <div class="input-box">
                                    <label>Telefone</label>
                                    <input type="text" id="phone-field" placeholder="(00) 00000-0000" required>
                                </div>
                                <div class="input-box">
                                    <label>Endereço</label>
                                    <input type="text" id="cliente-endereco" placeholder="Digite o endereço" required>
                                </div>
                                <div class="input-box">
                                    <label>E-mail (opcional)</label>
                                    <input type="email" id="cliente-email" placeholder="Digite o e-mail">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" id="btn-salvar-cliente" class="btn btn-primary">
                                    <i class="fa-solid fa-check"></i> Salvar Cliente
                                </button>
                                <button type="reset" class="btn btn-secondary" onclick="cancelarEdicaoCliente()">
                                    <i class="fa-solid fa-xmark"></i> Limpar
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- TABELA DE CLIENTES CADASTRADOS -->
                    <div class="forms-card">
                        <h3><i class="fa-solid fa-address-book"></i> Clientes Cadastrados</h3>
                        <div class="table-container">
                            <table class="stock-table" id="tabela-clientes">
                                <thead>
                                    <tr>
                                        <th>Nome</th>
                                        <th>Telefone</th>
                                        <th>Endereço</th>
                                        <th>E-mail</th>
                                        <th style="text-align: center; width: 120px;">Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Preenchido dinamicamente via script.js -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- SEÇÃO 2: CADASTRO DE PRODUTO NO ESTOQUE -->
                <div class="form-section" id="section-form-estoque">
                    <div class="forms-card">
                        <div class="section-header">
                            <h2><i class="fa-solid fa-box-archive"></i> Dados do Produto (Estoque)</h2>
                            <i class="fa-solid fa-cubes" style="color: #64748b; font-size: 20px;"></i>
                        </div>
                        <form onsubmit="handleFormAction(event, 'Produto')">
                            <div class="form-grid">
                                <div class="input-box">
                                    <label>Nome do produto</label>
                                    <input type="text" placeholder="Digite o nome do produto" required>
                                </div>
                                <div class="input-box">
                                    <label>Categoria</label>
                                    <select id="form-produto-categoria" required>
                                        <option value="" disabled selected>Selecione a categoria</option>
                                    </select>
                                </div>
                                <div class="input-box">
                                    <label>Marca</label>
                                    <input type="text" placeholder="Digite a marca" required>
                                </div>
                                <div class="input-box">
                                    <label>Preço unitário (R$)</label>
                                    <input type="number" step="0.01" placeholder="0,00" required>
                                </div>
                                <div class="input-box">
                                    <label>Quantidade atual</label>
                                    <input type="number" placeholder="0" required>
                                </div>
                                <div class="input-box">
                                    <label>Estoque mínimo</label>
                                    <input type="number" placeholder="0" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-success">
                                    <i class="fa-solid fa-plus"></i> Salvar Produto
                                </button>
                                <button type="reset" class="btn btn-secondary">
                                    <i class="fa-solid fa-xmark"></i> Limpar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
