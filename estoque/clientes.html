<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastros - Depósito de Bebidas JP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container active-view">
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-boxes-stacked brand-icon"></i>
                <div class="brand-text">
                    <h3>Depósito</h3>
                    <p>de Bebidas JP</p>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a class="menu-item" href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a class="menu-item active" href="clientes.html"><i class="fa-solid fa-users"></i> Clientes (Cadastro)</a>
                <a class="menu-item" href="estoque.html"><i class="fa-solid fa-box"></i> Estoque (Lista)</a>
                <a class="menu-item" href="categories.html" id="link-cat-menu"><i class="fa-solid fa-tags"></i> Categorias</a>
                <a class="menu-item" href="relatorios.html"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
                <a class="menu-item logout" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1 id="page-title">Cadastro</h1>
                <div class="user-dropdown">
                    <i class="fa-solid fa-circle-user user-icon"></i>
                    <span>Administrador</span>
                </div>
            </header>

            <div id="view-cadastro" class="app-view active-view">
                <div class="tab-navigation">
                    <button id="tab-btn-cliente" class="tab-btn active" onclick="switchFormTab('cliente')">
                        <i class="fa-solid fa-user-plus"></i> Cadastro de Cliente
                    </button>
                    <button id="tab-btn-estoque" class="tab-btn" onclick="switchFormTab('estoque')">
                        <i class="fa-solid fa-box-archive"></i> Cadastro de Estoque
                    </button>
                </div>

                <div class="forms-card">
                    <section id="section-form-cliente" class="form-section active">
                        <div class="section-header">
                            <h2>Dados do Cliente</h2>
                            <i class="fa-solid fa-users section-illustration"></i>
                        </div>
                        <form onsubmit="handleFormAction(event, 'Cliente')">
                            <div class="input-box half-width">
                                <label>Nome</label>
                                <input type="text" placeholder="Digite o nome" required>
                            </div>
                            <div class="input-box half-width">
                                <label>Telefone</label>
                                <input type="text" id="phone-field" placeholder="(00) 00000-0000" required>
                            </div>
                            <div class="input-box half-width">
                                <label>Endereço</label>
                                <input type="text" placeholder="Digite o endereço" required>
                            </div>
                            <div class="input-box half-width">
                                <label>E-mail (opcional)</label>
                                <input type="email" placeholder="Digite o e-mail">
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Salvar Cliente</button>
                                <button type="reset" class="btn btn-secondary"><i class="fa-solid fa-xmark"></i> Limpar</button>
                            </div>
                        </form>

                        <div class="lista-clientes-container" style="margin-top: 35px; border-top: 2px dashed #e2e8f0; padding-top: 20px;">
                            <h3 style="margin-bottom: 15px; color: #334155;"><i class="fa-solid fa-address-book"></i> Clientes Cadastrados</h3>
                            <div class="table-container" style="background: #fff; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow-x: auto; width: 100%;">
                                <table class="stock-table" id="tabela-clientes" style="width: 100%; border-collapse: collapse; text-align: left;">
                                    <thead>
                                        <tr style="background: #f8fafc; border-bottom: 2px solid #edf2f7;">
                                            <th style="padding: 12px 16px; color: #475569; font-weight: 600;">Nome</th>
                                            <th style="padding: 12px 16px; color: #475569; font-weight: 600;">Telefone</th>
                                            <th style="padding: 12px 16px; color: #475569; font-weight: 600;">Endereço</th>
                                            <th style="padding: 12px 16px; color: #475569; font-weight: 600;">E-mail</th>
                                            <th style="padding: 12px 16px; color: #475569; font-weight: 600;">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </div>
                    </section>

                    <section id="section-form-estoque" class="form-section">
                        <div class="section-header">
                            <h2>Dados do Produto (Estoque)</h2>
                            <i class="fa-solid fa-box-open section-illustration"></i>
                        </div>
                        <form onsubmit="handleFormAction(event, 'Produto')">
                            <div class="form-grid">
                                <div class="input-box">
                                    <label>Nome do produto</label>
                                    <input type="text" placeholder="Digite o nome do produto" required>
                                </div>
                                <div class="input-box">
                                    <label>Categoria</label>
                                    <select required id="form-produto-categoria"></select>
                                </div>
                                <div class="input-box">
                                    <label>Marca</label>
                                    <input type="text" placeholder="Digite a marca" required>
                                </div>
                                <div class="input-box">
                                    <label>Preço unitário (R$)</label>
                                    <input type="number" step="0.01" placeholder="0,00" required>
                                </div>
                                <div class="input-box">
                                    <label>Quantidade atual</label>
                                    <input type="number" value="0" min="0" required>
                                </div>
                                <div class="input-box">
                                    <label>Estoque mínimo</label>
                                    <input type="number" value="0" min="0" required>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Salvar Produto</button>
                                <button type="reset" class="btn btn-secondary"><i class="fa-solid fa-xmark"></i> Limpar</button>
                            </div>
                        </form>
                    </section>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
