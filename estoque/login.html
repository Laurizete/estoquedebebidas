<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Depósito de Bebidas JP</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="view-login" class="login-container active-view">
        <div class="login-box">
            <div class="login-form-side">
                <div class="login-logo">
                    <i class="fa-solid fa-boxes-stacked"></i>
                </div>
                <h2>Depósito de Bebidas JP</h2>
                <p class="login-subtitle">Controle de Estoque</p>

                <form onsubmit="handleLogin(event)">
                    <div class="login-input-group">
                        <i class="fa-solid fa-user login-input-icon"></i>
                        <input id="usuario" type="text" placeholder="Usuário" required>
                    </div>

                    <div class="login-input-group">
                        <i class="fa-solid fa-lock login-input-icon"></i>
                        <input id="senha" type="password" placeholder="Senha" required>
                    </div>
                    <button type="submit" class="btn-login">
                        Entrar <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <a href="#" class="forgot-password" onclick="alert('Funcionalidade de recuperação de senha.')">Esqueceu a senha?</a>
            </div>
            <div class="login-image-side"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
