<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Depósito de Bebidas JP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page-body">
    <div class="login-card">
        <div class="login-header">
            <i class="fa-solid fa-boxes-stacked login-logo"></i>
            <h2>Depósito de Bebidas JP</h2>
            <p>Controle de Estoque</p>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="login-field-group">
                <i class="fa-solid fa-user login-icon"></i>
                <input type="text" id="usuario" placeholder="Usuário" required>
            </div>
            
            <div class="login-field-group">
                <i class="fa-solid fa-lock login-icon"></i>
                <input type="password" id="senha" placeholder="Senha" required>
            </div>

            <button type="submit" class="login-submit-btn">
                Entrar <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </form>

        <div class="login-card-footer">
            <a href="#">Esqueceu a senha?</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
