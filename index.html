<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Depósito de Bebidas JP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container active-view">
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-boxes-stacked brand-icon"></i>
                <div class="brand-text">
                    <h3>Depósito</h3>
                    <p>de Bebidas JP</p>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a class="menu-item active" href="index.html"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a class="menu-item" href="clientes.html"><i class="fa-solid fa-users"></i> Cadastro</a>
                <a class="menu-item" href="estoque.html"><i class="fa-solid fa-box"></i> Estoque</a>
                <a class="menu-item" href="categorias.html"><i class="fa-solid fa-tags"></i> Categorias</a>
                <a class="menu-item" href="relatorios.html"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
                <a class="menu-item logout" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1 id="page-title">Dashboard</h1>
                <div class="user-dropdown">
                    <i class="fa-solid fa-circle-user user-icon"></i>
                    <span>Administrador</span>
                </div>
            </header>

            <div id="view-dashboard" class="app-view active-view">
                <div class="summary-cards" style="margin-bottom: 25px; display: flex; gap: 20px;">
                    <div class="summary-card blue-card" style="flex: 1;">
                        <p><i class="fa-solid fa-box"></i> Total de Produtos</p>
                        <h2 id="dash-total-qtd">0 un.</h2>
                    </div>
                    <div class="summary-card green-card" style="flex: 1;">
                        <p><i class="fa-solid fa-dollar-sign"></i> Valor em Estoque</p>
                        <h2 id="dash-total-valor">R$ 0,00</h2>
                    </div>
                    <div class="summary-card" id="dash-alerta-card" style="flex: 1; background: #eef2f7; border-left: 5px solid #ff9800; padding: 20px; border-radius: 8px;">
                        <p style="color: #666; margin: 0;"><i class="fa-solid fa-triangle-exclamation"></i> Alerta de Estoque Baixo</p>
                        <h2 id="dash-total-alertas" style="margin: 5px 0 0 0; color: #333;">0 Itens</h2>
                    </div>
                </div>

                <div class="forms-card" style="padding: 20px;">
                    <h3><i class="fa-solid fa-bolt" style="color: #f39c12;"></i> Ações Rápidas</h3>
                    <div style="display: flex; gap: 15px; margin-top: 15px;">
                        <a href="clientes.html" class="btn btn-primary" style="text-decoration:none;"><i class="fa-solid fa-user-plus"></i> Novo Cliente</a>
                        <a href="clientes.html?aba=estoque" class="btn btn-success" style="text-decoration:none;"><i class="fa-solid fa-plus"></i> Novo Produto</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
